<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiệp Mời Sinh Nhật</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #fff0f5;
        margin: 0;
        padding: 0;
        text-align: center;
      }
      .card {
        max-width: 600px;
        margin: 20px auto;
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .card img {
        width: 100%;
        max-width: 350px;
        height: auto;
        border-radius: 12px;
        margin: 0 auto 20px;
        display: block;
      }
      h1 {
        color: #e91e63;
        font-size: 1.8em;
      }
      .info {
        font-size: 1.1rem;
        margin: 10px 0 20px;
        line-height: 1.6;
      }
      .btn {
        background-color: #e91e63;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
      }
      .btn:hover {
        background-color: #d81b60;
      }
      iframe {
        width: 100%;
        max-width: 100%;
        border: none;
        margin-top: 15px;
      }
      .thanks {
        display: none;
        font-size: 1.2rem;
        color: green;
        margin-top: 20px;
      }
      #form-container {
        display: none;
        position: relative;
      }
      .map-container {
        position: relative;
        margin: 20px 0;
      }
      .map-container iframe {
        width: 100%;
        height: 300px;
        border-radius: 10px;
      }
      .map-container a {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        text-indent: -9999px;
      }
      #confirmButtonContainer {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
      }
      @media screen and (max-width: 600px) {
        body {
          font-size: 16px;
        }
        .card {
          margin: 10px;
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Ảnh thiệp mời -->
      <img src="Anh.jpg" alt="Ảnh thiệp mời" />

      <h1>🎉 Thiệp Mời Sinh Nhật 🎉</h1>
      <div class="info">
        Mời bạn đến dự sinh nhật của <strong>Quí Anh</strong><br />
        📍 Địa điểm: Nhà hàng Biển Xanh, TP. Thái Nguyên<br />
        🕕 Thời gian: 18h00 - Ngày 24/07/2025<br />
        🎁 Rất mong được đón tiếp bạn!
      </div>

      <!-- Bản đồ -->
      <div class="map-container">
        <iframe
          src="https://maps.google.com/maps?q=21.586164,105.798366&hl=vi&z=17&output=embed"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>
        <a
          href="https://www.google.com/maps/dir/?api=1&destination=21.586164,105.798366"
          target="_blank"
          title="Chỉ đường đến địa điểm"
          >Chỉ đường</a
        >
      </div>

      <button class="btn" onclick="showForm()">Tôi sẽ tham gia</button>

      <!-- Biểu mẫu -->
      <div id="form-container">
        <iframe
          id="formFrame"
          height="700"
          src="https://docs.google.com/forms/d/e/1FAIpQLSd4Rg2HSJRbi9jdVLFrPtFlMfKHNYQ6wSQvF6DL2SOhn5Pkdw/viewform?embedded=true"
        >
          Đang tải biểu mẫu…
        </iframe>

        <div id="confirmButtonContainer">
          <button class="btn" onclick="confirmSent()">Tôi đã gửi form</button>
        </div>
      </div>

      <div id="thanks" class="thanks">
        🎉 Cảm ơn bạn đã xác nhận! Hẹn gặp lại trong buổi tiệc nhé! 🎊
      </div>
    </div>

    <!-- Nhạc nền -->
    <audio id="myAudio" loop>
      <source src="sinhnhat.mp3" type="audio/mpeg" />
      Trình duyệt không hỗ trợ phát nhạc.
    </audio>

    <!-- Pháo giấy -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
      // Phát nhạc khi người dùng nhấp lần đầu
      window.addEventListener(
        "click",
        function () {
          const audio = document.getElementById("myAudio");
          if (audio.paused) {
            audio
              .play()
              .catch((e) => console.log("Trình duyệt chặn tự động phát."));
          }
        },
        { once: true }
      );

      function showForm() {
        const form = document.getElementById("form-container");
        form.style.display = "block";
        form.scrollIntoView({ behavior: "smooth" });
      }

      function confirmSent() {
        document.getElementById("form-container").style.display = "none";
        document.getElementById("thanks").style.display = "block";
        confetti({
          particleCount: 150,
          spread: 80,
          origin: { y: 0.6 },
        });
      }
    </script>
  </body>
</html>
